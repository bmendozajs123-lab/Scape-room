<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>El Caso de la Hormona Perdida</title>
<style>
  :root{
    --bg-dark:#070d15;
    --panel:rgba(8,16,26,0.86);
    --panel-light:rgba(14,26,40,0.7);
    --neon-blue:#3fb6ff;
    --neon-red:#ff4d5e;
    --text:#eaf2f9;
    --text-dim:#a9bdce;
    --amber:#ffd27a;
    --locked:#445261;
    --ok:#5fd98a;
    --danger:#ff6b6b;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    background:var(--bg-dark);
    color:var(--text);
    min-height:100vh;
  }
  h1,h2,h3,.serif{font-family:Georgia,"Times New Roman",serif;}
  .mono{font-family:"Courier New",Courier,monospace;}
  #app{min-height:100vh;}

  .screen{
    position:relative;
    min-height:100vh;
    background-size:cover;
    background-position:center;
    display:flex;
    flex-direction:column;
  }
  .scrim{
    position:absolute;inset:0;
    background:linear-gradient(180deg, rgba(4,8,14,0.55) 0%, rgba(4,8,14,0.80) 55%, rgba(4,8,14,0.92) 100%);
    z-index:0;
  }
  .scrim.bright{
    background:linear-gradient(180deg, rgba(255,250,235,0.45) 0%, rgba(255,248,225,0.72) 60%, rgba(255,246,215,0.88) 100%);
  }
  .content{
    position:relative;z-index:1;
    width:100%;max-width:640px;margin:0 auto;
    padding:18px 18px 40px;
    flex:1;
    display:flex;flex-direction:column;
  }

  /* ---- topbar ---- */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    gap:8px;margin-bottom:18px;flex-wrap:wrap;
  }
  .iconbtn{
    background:var(--panel-light);
    border:1px solid rgba(255,255,255,0.15);
    color:var(--text);
    padding:8px 12px;border-radius:10px;
    font-size:13px;cursor:pointer;
    display:flex;align-items:center;gap:6px;
    backdrop-filter:blur(6px);
  }
  .iconbtn:hover{border-color:var(--neon-blue);}
  .timerbox{
    background:#03110a;border:1px solid #1d4d34;
    color:var(--ok);padding:7px 14px;border-radius:10px;
    font-size:15px;letter-spacing:1px;
    box-shadow:0 0 12px rgba(95,217,138,0.35) inset;
  }

  /* ---- generic card/panel ---- */
  .panel{
    background:var(--panel);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:var(--radius);
    padding:20px;
    margin-bottom:16px;
    backdrop-filter:blur(8px);
    box-shadow:0 8px 30px rgba(0,0,0,0.4);
  }
  .panel.bright{
    background:rgba(255,252,240,0.88);
    border:1px solid rgba(150,110,30,0.25);
    color:#3a2f22;
    box-shadow:0 8px 24px rgba(120,90,30,0.18);
  }
  .label-eyebrow{
    font-size:11px;letter-spacing:2px;text-transform:uppercase;
    color:var(--neon-blue);margin-bottom:6px;font-weight:600;
  }
  .panel.bright .label-eyebrow{color:#b5862a;}

  .btn{
    display:inline-block;border:none;border-radius:10px;
    padding:13px 20px;font-size:15px;font-weight:600;cursor:pointer;
    background:var(--neon-blue);color:#02131f;
    transition:transform .12s ease;
  }
  .btn:hover{transform:translateY(-1px);}
  .btn:disabled{background:var(--locked);color:#828f9c;cursor:not-allowed;transform:none;}
  .btn.secondary{background:transparent;border:1px solid var(--neon-blue);color:var(--neon-blue);}
  .btn.bright{background:#c98f1f;color:#fffaf0;}
  .btn.full{width:100%;text-align:center;}
  .btn.danger-outline{background:transparent;border:1px solid var(--neon-red);color:var(--neon-red);}

  input[type=text]{
    width:100%;padding:13px 14px;border-radius:10px;
    border:1px solid rgba(255,255,255,0.2);
    background:rgba(255,255,255,0.06);color:var(--text);
    font-size:15px;margin-bottom:10px;
  }
  input[type=text]::placeholder{color:var(--text-dim);}
  input[type=text]:focus{outline:none;border-color:var(--neon-blue);}
  .panel.bright input[type=text]{background:#fff;border:1px solid #d8c39a;color:#3a2f22;}

  .error-msg{color:var(--danger);font-size:13.5px;margin:6px 0 10px;}
  .hint-text{
    font-style:italic;color:var(--amber);
    line-height:1.5;font-size:14.5px;margin-bottom:14px;
    border-left:3px solid var(--amber);padding-left:12px;
    text-align:justify;text-justify:inter-word;
  }

  /* ---- start screen ---- */
  .start-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;}
  .start-wrap h1{font-size:28px;line-height:1.25;margin:0 0 6px;color:#fff;text-shadow:0 0 18px rgba(63,182,255,0.5);}
  .start-wrap .tagline{color:var(--neon-red);font-size:12.5px;letter-spacing:2px;text-transform:uppercase;margin-bottom:18px;}
  .narrative{color:var(--text-dim);font-size:14.5px;line-height:1.65;margin-bottom:22px;text-align:justify;text-justify:inter-word;}

  /* ---- hub mission grid ---- */
  .patient-banner{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:14px;flex-wrap:wrap;gap:6px;
  }
  .patient-banner .name{font-size:16px;font-weight:700;}
  .progress-pill{
    font-size:12px;color:var(--text-dim);background:rgba(255,255,255,0.06);
    padding:4px 10px;border-radius:20px;
  }
  .mission-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  @media (max-width:480px){.mission-grid{grid-template-columns:1fr;}}
  .mission-card{
    background:var(--panel-light);border:1px solid rgba(255,255,255,0.1);
    border-radius:12px;padding:16px;cursor:pointer;text-align:left;
    transition:border-color .15s ease, transform .15s ease;
    position:relative;
  }
  .mission-card .num{font-size:11px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;}
  .mission-card .ttl{font-size:15px;font-weight:700;margin-top:4px;}
  .mission-card.active{border-color:var(--neon-blue);box-shadow:0 0 0 1px var(--neon-blue), 0 0 22px rgba(63,182,255,0.35);animation:pulse 2.2s infinite;}
  .mission-card.done{border-color:var(--ok);}
  .mission-card.done .ttl{color:var(--ok);}
  .mission-card.locked{opacity:0.45;cursor:not-allowed;}
  @keyframes pulse{0%{box-shadow:0 0 0 1px var(--neon-blue),0 0 10px rgba(63,182,255,0.25);}50%{box-shadow:0 0 0 1px var(--neon-blue),0 0 26px rgba(63,182,255,0.55);}100%{box-shadow:0 0 0 1px var(--neon-blue),0 0 10px rgba(63,182,255,0.25);}}
  .badge{position:absolute;top:10px;right:12px;font-size:14px;}

  /* ---- quiz ---- */
  .quiz-q{font-size:15px;line-height:1.55;margin-bottom:14px;text-align:justify;text-justify:inter-word;}
  .opt-btn{
    display:block;width:100%;text-align:left;
    background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);
    color:var(--text);padding:12px 14px;border-radius:10px;
    margin-bottom:9px;font-size:14.5px;cursor:pointer;
  }
  .opt-btn:hover{border-color:var(--neon-blue);}
  .opt-letter{display:inline-block;width:20px;font-weight:700;color:var(--neon-blue);}

  /* ---- maze ---- */
  .maze-wrap{display:flex;flex-direction:column;align-items:center;flex:1;justify-content:center;}
  .maze-board{
    display:grid;background:#020509;border:2px solid #1c3a52;border-radius:8px;
    width:min(92vw,420px);height:min(92vw,420px);
    box-shadow:0 0 30px rgba(63,182,255,0.25);
  }
  .maze-cell{position:relative;}
  .maze-cell.fog{background:#020509;}
  .maze-cell.seen{background:#0a1622;}
  .maze-cell.visible{background:#10243a;}
  .maze-player{
    position:absolute;inset:18%;border-radius:50%;
    background:radial-gradient(circle,#bdf0ff,#3fb6ff);
    box-shadow:0 0 10px #3fb6ff;
  }
  .maze-goal{
    position:absolute;inset:14%;border-radius:4px;
    background:radial-gradient(circle,#ffe9a8,#ffb13f);
    box-shadow:0 0 12px #ffb13f;
  }
  .maze-controls{display:grid;grid-template-columns:48px 48px 48px;grid-template-rows:48px 48px 48px;gap:6px;margin-top:18px;}
  .maze-controls button{
    background:var(--panel-light);border:1px solid rgba(255,255,255,0.2);
    color:var(--text);border-radius:10px;font-size:18px;cursor:pointer;
  }
  .maze-steps{color:var(--text-dim);font-size:13px;margin-top:10px;}

  /* ---- conversation ---- */
  .bubble{
    background:rgba(255,255,255,0.92);color:#222;border-radius:16px 16px 16px 4px;
    padding:14px 16px;max-width:84%;font-size:15px;line-height:1.5;
    box-shadow:0 6px 18px rgba(0,0,0,0.3);margin-bottom:18px;
    text-align:justify;text-justify:inter-word;
  }
  .bubble .who{font-size:11px;color:#b03040;font-weight:700;letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:4px;}

  /* ---- folder modal ---- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.65);
    display:flex;align-items:center;justify-content:center;z-index:50;padding:18px;
  }
  .modal-box{
    background:#0b1622;border:1px solid rgba(255,255,255,0.15);
    border-radius:16px;max-width:480px;width:100%;max-height:80vh;overflow-y:auto;
    padding:20px;
  }
  .modal-box h3{margin-top:0;}
  .finding-item{
    background:rgba(255,255,255,0.05);border-left:3px solid var(--amber);
    padding:10px 12px;border-radius:8px;margin-bottom:10px;font-size:14px;line-height:1.5;
    text-align:justify;text-justify:inter-word;
  }
  .empty-folder{color:var(--text-dim);font-size:14px;font-style:italic;}

  /* ---- end screen ---- */
  .end-title{font-size:26px;color:#7a4e10;margin-bottom:4px;}
  .end-badge{
    display:inline-block;background:#3f8f5f;color:#fff;font-size:12px;
    padding:5px 12px;border-radius:20px;letter-spacing:1px;margin-bottom:14px;
  }
  .end-time{font-size:34px;font-weight:700;color:#3a2f22;letter-spacing:1px;}
  .panel.bright p{text-align:justify;text-justify:inter-word;}
  .credits-grid{display:flex;flex-direction:column;gap:4px;font-size:14px;color:#4a3c28;}
  .credits-grid b{color:#3a2f22;}

  footer.tiny{text-align:center;color:var(--text-dim);font-size:11px;margin-top:auto;padding-top:14px;}

  /* ---- responsive scaling for tablet / desktop ---- */
  @media (min-width:700px){
    .content{max-width:760px;padding:32px 36px 56px;}
    .panel{padding:26px;border-radius:18px;}
    .btn{padding:16px 26px;font-size:16.5px;border-radius:12px;}
    .opt-btn{padding:15px 18px;font-size:15.5px;border-radius:12px;margin-bottom:11px;}
    input[type=text]{padding:16px 18px;font-size:16.5px;border-radius:12px;}
    .iconbtn{padding:10px 16px;font-size:14.5px;}
    .timerbox{font-size:16.5px;padding:9px 18px;}
    .start-wrap h1{font-size:36px;}
    .start-wrap .tagline{font-size:14px;}
    .narrative{font-size:16px;}
    .quiz-q{font-size:17px;}
    .hint-text{font-size:16px;}
    h2{font-size:24px !important;}
    .mission-grid{grid-template-columns:repeat(3,1fr);gap:16px;}
    .mission-card{padding:20px;}
    .mission-card .ttl{font-size:17px;}
    .patient-banner .name{font-size:19px;}
    .maze-board{width:min(64vmin,560px);height:min(64vmin,560px);}
    .maze-controls{grid-template-columns:60px 60px 60px;grid-template-rows:60px 60px 60px;gap:8px;}
    .maze-controls button{font-size:22px;border-radius:12px;}
    .maze-steps{font-size:15px;}
    .bubble{font-size:16.5px;padding:16px 18px;}
    .modal-box{max-width:560px;padding:26px;}
    .end-title{font-size:30px;}
    .end-time{font-size:40px;}
  }
  @media (min-width:1100px){
    .content{max-width:880px;}
    .start-wrap h1{font-size:42px;}
    .maze-board{width:min(58vmin,640px);height:min(58vmin,640px);}
  }
</style>
</head>

/* ---------------- HELPERS ---------------- */
function normalize(s){
  return (s||"").toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim().replace(/\s+/g," ");
}
function normalizeCase(s){
  return (s||"").toString().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim().replace(/\s+/g," ");
}
function toTitleCase(s){
  return s.split(" ").map(w => w.length ? w[0].toUpperCase()+w.slice(1).toLowerCase() : w).join(" ");
}
function formatTime(ms){
  const totalSec = Math.max(0, Math.floor(ms/1000));
  const m = String(Math.floor(totalSec/60)).padStart(2,"0");
  const s = String(totalSec%60).padStart(2,"0");
  return m+":"+s;
}
function esc(str){
  const d = document.createElement("div");
  d.innerText = str;
  return d.innerHTML;
}

/* ---------------- TIMER ---------------- */
function startTimer(){
  state.startTime = Date.now();
  if(state.timerId) clearInterval(state.timerId);
  state.timerId = setInterval(()=>{
    const el = document.getElementById("timerEl");
    if(el) el.textContent = formatTime(Date.now()-state.startTime);
  }, 500);
}
function stopTimer(){
  if(state.timerId){ clearInterval(state.timerId); state.timerId=null; }
  state.endTime = Date.now();
}

/* ---------------- NAVIGATION ---------------- */
function startGame(){
  const input = document.getElementById("nameInput");
  const val = (input.value||"").trim();
  if(!val){ state.startError = "Escribe tu nombre para aceptar el caso."; render(); return; }
  state.name = toTitleCase(val);

  render();
}
function goHub(){

function goToMission(id){
  if(id === 6){

    state.screen = "conversation";
    state.active = { missionId:6, quizPassed:true, mazeDone:false, error:"" };

  if(id > nextAllowed) return; // locked
  state.active = { missionId:id, quizPassed: state.completed.includes(id), mazeDone: state.completed.includes(id), error:"" };
  state.screen = "mission";
  render();
}

/* ---------------- MAZE ---------------- */
const MAZE_W = 9, MAZE_H = 9;
function generateMazeCells(w,h){
  const cells = Array.from({length:h}, ()=>Array.from({length:w}, ()=>({N:true,S:true,E:true,W:true})));
  const visited = Array.from({length:h}, ()=>Array(w).fill(false));
  function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
  const stack = [[0,0]];
  visited[0][0] = true;
  while(stack.length){
    const [x,y] = stack[stack.length-1];
    const dirs = shuffle([["N",0,-1],["S",0,1],["E",1,0],["W",-1,0]]);
    let moved = false;
    for(const [dir,dx,dy] of dirs){
      const nx=x+dx, ny=y+dy;
      if(nx>=0 && nx<w && ny>=0 && ny<h && !visited[ny][nx]){
        cells[y][x][dir] = false;
        const opp = {N:"S",S:"N",E:"W",W:"E"};
        cells[ny][nx][opp[dir]] = false;
        visited[ny][nx] = true;
        stack.push([nx,ny]);
        moved = true;
        break;
      }
    }
    if(!moved) stack.pop();
  }
  return cells;
}
function initMaze(){
  state.maze = {
    cells: generateMazeCells(MAZE_W, MAZE_H),
    px: 0, py: 0,
    gx: MAZE_W-1, gy: MAZE_H-1,
    steps: 0,
    seen: new Set(["0,0"])
  };
}
function moveMaze(dx,dy){
  const mz = state.maze;
  if(!mz) return;
  const cell = mz.cells[mz.py][mz.px];
  let blocked = true;
  if(dx===0 && dy===-1 && !cell.N) blocked=false;
  if(dx===0 && dy===1 && !cell.S) blocked=false;
  if(dx===1 && dy===0 && !cell.E) blocked=false;
  if(dx===-1 && dy===0 && !cell.W) blocked=false;
  if(blocked){
    mz.px = 0; mz.py = 0;
    mz.steps = 0;
    mz.seen = new Set(["0,0"]);
    renderMazeBoardOnly();
    return;
  }
  const nx = mz.px+dx, ny = mz.py+dy;
  if(nx<0||nx>=MAZE_W||ny<0||ny>=MAZE_H) return;
  mz.px = nx; mz.py = ny; mz.steps++;
  mz.seen.add(nx+","+ny);
  renderMazeBoardOnly();
  if(nx===mz.gx && ny===mz.gy){
    setTimeout(()=>{
      state.active.mazeDone = true;
      state.screen = "mission";
      render();
    }, 350);
  }
}
function mazeKeyHandler(e){
  if(state.screen !== "maze") return;
  const map = {ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],w:[0,-1],s:[0,1],a:[-1,0],d:[1,0]};
  if(map[e.key]){ e.preventDefault(); moveMaze(map[e.key][0], map[e.key][1]); }
}
document.addEventListener("keydown", mazeKeyHandler);

function renderMazeBoardOnly(){
  const board = document.getElementById("mazeBoard");
  const steps = document.getElementById("mazeSteps");
  if(!board) return;
  board.innerHTML = mazeBoardHtml();
  if(steps) steps.textContent = "Pasos: " + state.maze.steps;
}
function mazeBoardHtml(){
  const mz = state.maze;
  let html = "";
  for(let y=0;y<MAZE_H;y++){
    for(let x=0;x<MAZE_W;x++){
      const c = mz.cells[y][x];
      const dist = Math.max(Math.abs(x-mz.px), Math.abs(y-mz.py));
      const visible = dist<=1;
      let cls = "maze-cell " + (visible ? "visible" : "fog");
      let style = "";
      let inner = "";
      if(visible){
        style = "border-top:" + (c.N?"1px solid #1c3a52":"1px solid transparent") +
                ";border-left:" + (c.W?"1px solid #1c3a52":"1px solid transparent") +
                ";border-right:" + (c.E?"1px solid #1c3a52":"1px solid transparent") +
                ";border-bottom:" + (c.S?"1px solid #1c3a52":"1px solid transparent") + ";";
        if(x===mz.px && y===mz.py) inner = '<div class="maze-player"></div>';
        else if(x===mz.gx && y===mz.gy) inner = '<div class="maze-goal"></div>';
      }
      html += '<div class="'+cls+'" style="'+style+'">'+inner+'</div>';
    }
  }
  return html;
}

/* ---------------- RENDER: SCREENS ---------------- */
function topbar(showMenu){
  return '<div class="topbar">' +
    (showMenu ? '<button class="iconbtn" onclick="goHub()">☰ Menú</button>' : '<span></span>') +
    '<div class="timerbox mono">⏱ <span id="timerEl">'+formatTime(Date.now()-(state.startTime||Date.now()))+'</span></div>' +
    '<button class="iconbtn" onclick="openFolder()">📁 Expediente</button>' +
  '</div>';
}

function renderStart(){
  return '<div class="screen" style="background-image:url(\''+IMAGES.cover+'\')">' +
    '<div class="scrim"></div>' +
    '<div class="content">' +
      '<div class="start-wrap">' +
        '<div class="tagline">Caso clínico urgente</div>' +
        '<h1>El Caso de la<br>Hormona Perdida</h1>' +
        '<p class="narrative">Camila Rojas, 28 años, ingresó con síntomas que nadie logra explicar del todo. Su expediente está incompleto y disperso. Eres la especialista o el especialista de turno: reúne los hallazgos, interpreta los resultados y llega al diagnóstico antes de que sea tarde.</p>' +
        '<div class="panel">' +
          '<div class="label-eyebrow">Identifícate</div>' +
          '<input type="text" id="nameInput" placeholder="Tu nombre" onkeydown="if(event.key===\'Enter\')startGame()">' +
          (state.startError ? '<div class="error-msg">'+esc(state.startError)+'</div>' : '') +
          '<button class="btn full" onclick="startGame()">Aceptar caso</button>' +
        '</div>' +
      '</div>' +
      '<footer class="tiny">El cronómetro inicia en el momento en que aceptas el caso.</footer>' +
    '</div>' +
  '</div>';
}

function renderHub(){
  const order = [1,2,3,4,5,6];
  const cards = order.map(id=>{
    const isDone = state.completed.includes(id);
    const isNext = (id === state.completed.length+1);
    const title = id===6 ? "Síntesis y diagnóstico" : MISSIONS[id].title;
    let cls = "mission-card";
    let badge = "";
    if(isDone){ cls += " done"; badge = '<span class="badge">✅</span>'; }
    else if(isNext){ cls += " active"; }
    else { cls += " locked"; badge = '<span class="badge">🔒</span>'; }
    const clickable = isDone || isNext;
    return '<div class="'+cls+'" '+(clickable?'onclick="goToMission('+id+')"':'')+'>'+
      badge+
      '<div class="num">Misión '+id+'</div>' +
      '<div class="ttl">'+esc(title)+'</div>' +
    '</div>';
  }).join("");

  return '<div class="screen" style="background-image:url(\''+IMAGES.general+'\')">' +
    '<div class="scrim"></div>' +
    '<div class="content">' +
      topbar(false) +
      '<div class="patient-banner">' +
        '<div class="name">🗂 '+esc(PATIENT_NAME)+'</div>' +
        '<div class="progress-pill">'+state.completed.length+'/6 misiones</div>' +
      '</div>' +
      '<div class="mission-grid">'+cards+'</div>' +
      '<footer class="tiny">Avanza en orden. Cada misión revela una pista para encontrar la siguiente.</footer>' +
    '</div>' +
  '</div>';
}

function renderQuizCard(m){
  return '<div class="panel">' +
    '<div class="label-eyebrow">Resultado de laboratorio</div>' +
    '<div class="quiz-q">'+m.quiz.q+'</div>' +
    m.quiz.options.map((opt,i)=>{
      const letter = ["A","B","C","D"][i];
      return '<button class="opt-btn" onclick="handleQuizAnswer('+i+')"><span class="opt-letter">'+letter+'.</span> '+esc(opt)+'</button>';
    }).join("") +
    (state.active.error ? '<div class="error-msg">'+esc(state.active.error)+'</div>' : '') +
  '</div>';
}

function renderHintPasswordCard(m, hintText){
  return '<div class="panel">' +
    '<div class="label-eyebrow">Pista</div>' +
    '<div class="hint-text">'+esc(hintText)+'</div>' +
    '<div class="label-eyebrow">Contraseña</div>' +
    '<input type="text" id="passInput" placeholder="Escribe la contraseña" onkeydown="if(event.key===\'Enter\')handlePasswordSubmit()">' +
    (state.active.error ? '<div class="error-msg">'+esc(state.active.error)+'</div>' : '') +
    '<button class="btn full" onclick="handlePasswordSubmit()">Desbloquear</button>' +
  '</div>';
}

function renderMissionScreen(){
  const id = state.active.missionId;
  const m = MISSIONS[id];
  const isReview = state.completed.includes(id);

  let body = "";
  if(isReview){
    body = '<div class="panel">' +
      '<div class="label-eyebrow">Misión superada ✅</div>' +
      '<div class="quiz-q">'+esc(m.finding)+'</div>' +
      '<button class="btn secondary full" onclick="goHub()">Volver al panel</button>' +
    '</div>';
  } else if(!state.active.quizPassed){
    body = renderQuizCard(m);
  } else {
    // maze missions only land here after mazeDone
    const hintText = m.isMaze ? m.mazeHint : m.hint;
    body = renderHintPasswordCard(m, hintText);
  }

  return '<div class="screen" style="background-image:url(\''+IMAGES.general+'\')">' +
    '<div class="scrim"></div>' +
    '<div class="content">' +
      topbar(true) +
      '<div class="label-eyebrow" style="margin-bottom:8px;">Misión '+id+'</div>' +
      '<h2 style="margin:0 0 12px;font-size:20px;">'+esc(m.title)+'</h2>' +
      body +
    '</div>' +
  '</div>';
}

function renderMazeScreen(){
  return '<div class="screen" style="background-image:url(\''+IMAGES.general+'\')">' +
    '<div class="scrim"></div>' +
    '<div class="content">' +
      topbar(true) +
      '<h2 style="margin:0 0 6px;font-size:19px;text-align:center;">Encuentra la salida</h2>' +
      '<p class="hint-text" style="text-align:center;border-left:none;padding-left:0;">Tu visión está limitada. Muévete con las flechas, WASD o los botones.</p>' +
      '<div class="maze-wrap">' +
        '<div id="mazeBoard" class="maze-board" style="grid-template-columns:repeat('+MAZE_W+',1fr);grid-template-rows:repeat('+MAZE_H+',1fr);">'+mazeBoardHtml()+'</div>' +
        '<div class="maze-controls">' +
          '<span></span><button onclick="moveMaze(0,-1)">▲</button><span></span>' +
          '<button onclick="moveMaze(-1,0)">◀</button><span></span><button onclick="moveMaze(1,0)">▶</button>' +
          '<span></span><button onclick="moveMaze(0,1)">▼</button><span></span>' +
        '</div>' +
        '<div class="maze-steps mono" id="mazeSteps">Pasos: '+state.maze.steps+'</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function renderConversation(){
  return '<div class="screen" style="background-image:url(\''+IMAGES.patient+'\')">' +
    '<div class="scrim"></div>' +
    '<div class="content">' +
      topbar(true) +
      '<div style="flex:1;display:flex;flex-direction:column;justify-content:center;">' +
        '<div class="bubble"><span class="who">Camila Rojas</span>Doctor... ya vi los resultados pero no entiendo nada. ¿Qué tengo?</div>' +
        '<div class="panel">' +
          '<div class="label-eyebrow">Tu respuesta</div>' +
          '<input type="text" id="diagInput" placeholder="Escribe el diagnóstico" onkeydown="if(event.key===\'Enter\')handleDiagnosisSubmit()">' +
          '<div style="font-size:12.5px;color:var(--text-dim);margin:-6px 0 10px;">Una sola palabra, con la primera letra en mayúscula.</div>' +
          (state.active.error ? '<div class="error-msg">'+esc(state.active.error)+'</div>' : '') +
          '<button class="btn full" onclick="handleDiagnosisSubmit()">Responder</button>' +
        '</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function renderEnd(){
  const totalMs = (state.endTime||Date.now()) - (state.startTime||Date.now());
  return '<div class="screen" style="background-image:url(\''+IMAGES.end+'\')">' +
    '<div class="scrim bright"></div>' +
    '<div class="content">' +
      '<div style="flex:1;display:flex;flex-direction:column;justify-content:center;">' +
        '<div class="panel bright">' +
          '<span class="end-badge">✔ Paciente estable</span>' +
          '<div class="end-title serif">Caso resuelto</div>' +
          '<p style="margin:0 0 14px;">Camila puede ser tratada. Gracias, <b>'+esc(state.name)+'</b>.</p>' +
          '<div class="end-time mono">'+formatTime(totalMs)+'</div>' +
          '<p style="font-size:13px;color:#6b5a3e;margin-top:4px;">tiempo total para resolver el caso</p>' +
        '</div>' +
        '<div class="panel bright">' +
          '<div class="label-eyebrow">Resumen clínico</div>' +
          '<p style="font-size:14px;line-height:1.6;margin:0;">Hiperprolactinemia secundaria a un prolactinoma: el adenoma hipofisario secreta prolactina en exceso, inhibe la pulsatilidad de GnRH (causando amenorrea), estimula la lactogénesis (galactorrea) y, al crecer, comprime el quiasma óptico y las estructuras vecinas (cefalea, alteraciones visuales). El tratamiento de primera línea son los agonistas dopaminérgicos.</p>' +
        '</div>' +
        '<div class="panel bright">' +
          '<div class="label-eyebrow">Créditos</div>' +
          '<div class="credits-grid">' +
            '<div><b>'+esc(CREDITS.gameTitle)+'</b></div>' +
            '<div>Realizado por: '+CREDITS.team.map(esc).join(", ")+'</div>' +
            '<div>'+esc(CREDITS.course)+' · '+esc(CREDITS.professor)+'</div>' +
          '</div>' +
        '</div>' +
        '<button class="btn bright full" onclick="location.reload()">Jugar de nuevo</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function renderFolderModal(){
  if(!state.folderOpen) return "";
  const items = state.folder.length
    ? state.folder.map(f => '<div class="finding-item">'+esc(f)+'</div>').join("")
    : '<div class="empty-folder">Aún no hay hallazgos registrados.</div>';
  return '<div class="modal-overlay" onclick="if(event.target===this)closeFolder()">' +
    '<div class="modal-box">' +
      '<div class="label-eyebrow">Expediente médico</div>' +
      '<h3 style="margin-top:0;">'+esc(PATIENT_NAME)+'</h3>' +
      items +
      '<button class="btn secondary full" onclick="closeFolder()">Cerrar</button>' +
    '</div>' +
  '</div>';
}

/* ---------------- MAIN RENDER ---------------- */
function render(){
  const app = document.getElementById("app");
  let html = "";
  switch(state.screen){
    case "start": html = renderStart(); break;
    case "hub": html = renderHub(); break;
    case "mission": html = renderMissionScreen(); break;
    case "maze": html = renderMazeScreen(); break;
    case "conversation": html = renderConversation(); break;
    case "end": html = renderEnd(); break;
  }
  app.innerHTML = html + renderFolderModal();
}

render();
</script>
</body>
</html>
